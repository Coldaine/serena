gui_log_window: true
# Enable the graphical log window instead of web dashboard
# This is supported on Windows and provides a native GUI for monitoring Serena's activity

web_dashboard: false
# Disable web dashboard since we're using GUI log window instead
# You can enable both if you want, but GUI is more native on Windows

log_level: 10
# Log level: 10 = debug, 20 = info, 30 = warning, 40 = error
# Set to 10 (DEBUG) if you need more detailed troubleshooting information

trace_lsp_communication: false
# Set to True if you need to debug language server communication issues
# Warning: This creates very verbose logs, only enable when troubleshooting

tool_timeout: 180
# Increased timeout to 5 minutes for complex operations
# Default is 240 seconds, but some operations might need more time

