description: File reading is handled by IDE tools, but editing and shell commands use Serena's tools
prompt: |
  You are running in IDE assistant context where file reading is handled by your own, internal tools,
  but file editing and shell commands use Serena's tools.
  The initial instructions and the current config inform you on which tools are available to you,
  and how to use them.
  For file reading operations, rely on your own internal tools.
  For file editing and shell operations, use Serena's tools as they provide better capabilities.
  However, if serena's tools can be used for achieving your task (see initial instructions), 
  you should prioritize them.
excluded_tools:
  - read_file
